<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="A simple example " />
    <link rel="icon" href="https://fav.farm/🟢" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tip-calculator-app-ff</title>
  </head>
  <body>
    <main>
      <h1 class="sr-only">Splitter</h1>
      <img src="./src/assets/logo.svg" alt="Splitter Logo" srcset="" />

      <form action="" class="splitForm" id="splitForm">
        <div class="user-inputs">
          <label for="tip-price">Bill:</label>
          <input
            type="number"
            id="tip-price"
            placeholder="price"
            step=".01"
            value="0"
            min="0"
            max="9999999"
          />

          <p>Select Tip %</p>
          <div id="single-tip-amount">
            <button type="button" aria-label="5%">5%</button>
            <button type="button" aria-label="10%">10%</button>
            <button type="button" aria-label="15%">15%</button>
            <button type="button" aria-label="25%">25%</button>
            <button type="button" aria-label="50%">50%</button>
            <input
              type="number"
              aria-label="Custom tip amount"
              name=""
              id=""
              min="0"
              max="100"
              placeholder="Custom"
            />
          </div>

          <label for="number-of-people">Number of People:</label>
          <input type="number" name="number-of-people" id="number-of-people" />
        </div>

        <div class="calulated-totals">
          <p>Tip Amount / person</p>

          <p>Total / person</p>

          <button type="button" id="reset-button" aria-label="Reset">
            Reset
          </button>
        </div>
      </form>
      <button id="counter" type="button"></button>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
